<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML</title>
</head>
<body>
    <form action="dados.php" method="post">
        <div>
            <label for="">Tabela</label>
            <input type="text" name="texto">
        </div>
        <div>
            <label for="">Area de Texto</label>
            <input type="textarea" name="areadetexto">
        </div>
        <div>
            <label for="">Check box</label>
                <input type="checkbox" name="checkbox[]" value="op1">Opção 1
                <input type="checkbox" name="checkbox[]" value="op2">Opção 2
                <input type="checkbox" name="checkbox[]" value="op3">Opção 3
        </div>
        <div>
            <label for="">Botão radial</label>
                <input type="radio" name="radio" value="op1">Opção 1
                <input type="radio" name="radio" value="op2">Opção 2
                <input type="radio" name="radio" value="op3">Opção 3
        </div>
        <div>
            <label for="">Select e option</label>
            <select name="selecao" id="">
                <option value="op1">Opção 1</option>
                <option value="op2">Opção 2</option>
                <option value="op3">Opção 3</option>
            </select>
        </div>
        <div>
            <button type="input">Enviar</button>
        </div>
    </form>
</body>
</html>
